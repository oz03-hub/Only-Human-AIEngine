[pytest]
# Pytest configuration for AIEngine

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Pytest options
asyncio_mode = auto
testpaths = tests

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers
markers =
    asyncio: marks tests as async
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    slow: marks tests as slow running

# Logging
log_cli = false
log_cli_level = INFO
