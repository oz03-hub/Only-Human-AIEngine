apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: aiengine
  annotations:
    run.googleapis.com/launch-stage: BETA
    run.googleapis.com/ingress: all  # or 'internal' for VPC-only access
spec:
  template:
    metadata:
      annotations:
        # Enable Cloud SQL connections via Cloud SQL Proxy sidecar
        run.googleapis.com/cloudsql-instances: PROJECT_ID:REGION:INSTANCE_NAME
        # Allocate more CPU during request processing
        run.googleapis.com/cpu-throttling: 'false'
        # Set execution environment to gen2 (recommended)
        run.googleapis.com/execution-environment: gen2
    spec:
      # Service account with Cloud SQL Client role
      serviceAccountName: aiengine-sa@PROJECT_ID.iam.gserviceaccount.com

      # Container timeout (max 3600s for Cloud Run)
      timeoutSeconds: 300

      containers:
      - name: aiengine
        # Update with your GCP Artifact Registry path
        image: REGION-docker.pkg.dev/PROJECT_ID/aiengine/aiengine:latest

        ports:
        - name: http1
          containerPort: 8000

        env:
        # Database connection (Cloud SQL Proxy uses Unix socket)
        - name: DATABASE_URL
          value: postgresql+asyncpg://USER:PASSWORD@/DATABASE?host=/cloudsql/PROJECT_ID:REGION:INSTANCE_NAME

        # OpenAI API Key (use Secret Manager in production)
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openai-api-key
              key: latest

        # API Security (use Secret Manager in production)
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: api-key
              key: latest

        # External application URL for sending facilitation responses
        # WebhookClient appends /api/ai/facilitation to this base URL
        - name: APPLICATION_WEBHOOK_URL
          value: https://REPLACE_WITH_ONLYHUMAN_APP_URL

        # Application Configuration
        - name: ENV
          value: production
        - name: LOG_LEVEL
          value: INFO
        - name: MODEL_PATH
          value: models/temporal_classifier.pkl
        - name: STAGE_2_MODEL
          value: gpt-5-mini
        - name: STAGE_3_MODEL
          value: gpt-4.1
        - name: STAGE_4_MODEL
          value: gpt-5-mini
        - name: MIN_MESSAGES
          value: "5"
        - name: LIMIT_MESSAGES
          value: "10"

        # Cloud Run sets this automatically
        - name: PORT
          value: "8000"

        resources:
          limits:
            cpu: "1"
            memory: 2Gi

        # Startup probe (gives app time to start)
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3

        # Liveness probe (restarts container if unhealthy)
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3

      # Auto-scaling: single instance, always-on (no cold starts, background tasks get CPU)
      scaling:
        minScale: 1
        maxScale: 1
